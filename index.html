<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hadiah Dari Bidadari 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
background:linear-gradient(135deg,#dceeff,#ffd8ea,#fff,#f5e3d3);
background-size:400% 400%;
animation:bg 15s ease infinite;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.page{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:390px;
background:rgba(255,255,255,.86);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.12);
animation:fade .8s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.hidden{
display:none;
}

h1{
color:#78a6f5;
margin-bottom:15px;
}

p{
line-height:1.8;
color:#555;
}

button{
margin-top:20px;
padding:13px 28px;
border:none;
border-radius:50px;
background:#87b6ff;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

input{
width:100%;
padding:14px;
border:none;
border-radius:15px;
margin-top:20px;
text-align:center;
font-size:16px;
outline:none;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:25px;
}

.item{
background:white;
border-radius:18px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.item span{
font-size:55px;
display:block;
margin-bottom:10px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.popupCard{
background:white;
max-width:700px;
width:100%;
padding:30px;
border-radius:25px;
max-height:85vh;
overflow:auto;
}

#hearts span{
position:fixed;
bottom:-40px;
animation:heart linear infinite;
opacity:.8;
}

@keyframes heart{
from{
transform:translateY(0);
opacity:0;
}
20%{
opacity:1;
}
to{
transform:translateY(-120vh);
opacity:0;
}
}
</style>

</head>

<body>

<div id="hearts"></div>

<div id="home" class="page">

<div class="card">

<h1>Hadiah Dari Bidadari 🤍</h1>

<p>

Haiii sayang...

<br><br>

Aku punya hadiah kecil buat kamu.

Semoga kamu suka yaa ✨

</p>

<button onclick="start()">

Buka Hadiah

</button>

</div>

</div>

<div id="login" class="page hidden">

<div class="card">

<h1>🔐</h1>

<input
id="pass"
type="password"
placeholder="Masukkan Password">

<div id="error" style="color:#ff5b8a;margin-top:10px;"></div>

<button onclick="login()">

Masuk

</button>

</div>

</div>

<div id="gift" class="page hidden">

<div class="card">

<h1>🎁</h1>

<p>Pilih hadiah dari aku 🤍</p>

<div class="menu">

<div class="item">

<span>💌</span>

<button onclick="surat()">

Buka

</button>

</div>

<div class="item">

<span>🎵</span>

<button onclick="lagu()">

Putar

</button>

</div>

</div>

</div>

</div>

<div id="popup"></div>

<script>

function start(){

document.getElementById("home").classList.add("hidden");

document.getElementById("login").classList.remove("hidden");

}

function login(){

if(document.getElementById("pass").value==="09012007"){

document.getElementById("login").classList.add("hidden");

document.getElementById("gift").classList.remove("hidden");

}else{

document.getElementById("error").innerHTML="Password salah 🤍";

}

}

function lagu(){

window.open("https://open.spotify.com/search/daylight%20taylor%20swift");

}

function surat(){

document.getElementById("popup").innerHTML=`<div class="popup">

<div class="popupCard">

<h2 style="text-align:center;color:#78a6f5;">💌 Untuk Kamu</h2>

<p style="margin-top:20px;line-height:2;text-align:left;">

Selamat ulang tahun ya, kamu. 🤍
<br><br>

Jangan kaget dulu, iya ini aku yang biasanya nyebelin, suka gangguin, dan sok tengil tiba-tiba bikin beginian wkwk.
<br><br>

Tapi di balik semua bercandaan itu, aku beneran bersyukur kamu ada. Terima kasih udah jadi seseorang yang nemenin hari-hariku, yang bikin hal sederhana jadi punya cerita.
<br><br>

Di umur kamu yang baru ini, aku cuma berharap semoga hidup lebih baik sama kamu. Semoga kamu selalu dikelilingi hal-hal baik, dilancarkan semua yang kamu usahakan, dan tetap jadi kamu yang aku kenal.
<br><br>

Kalau nanti hari-hari terasa berat, semoga kamu ingat kalau ada seseorang yang selalu percaya sama kamu.
<br><br>

Happy birthday, sayang.
<br><br>

Makasih udah lahir dan jadi bagian dari ceritaku. ✨

</p>

<button onclick="tutup()">

Tutup Surat 🤍

</button>

</div>

</div>

`;

}

function tutup(){

document.getElementById("popup").innerHTML="";

}

for(let i=0;i<30;i++){

setTimeout(()=>{

buatHati();

},i*250);

}

setInterval(buatHati,700);

function buatHati(){

let hati=document.createElement("span");

hati.innerHTML=Math.random()>0.5?"🤍":"💖";

hati.style.left=Math.random()*100+"vw";

hati.style.fontSize=(18+Math.random()*20)+"px";

hati.style.animationDuration=(5+Math.random()*5)+"s";

document.getElementById("hearts").appendChild(hati);

setTimeout(()=>{

hati.remove();

},10000);

}

document.getElementById("pass").addEventListener("keypress",function(e){

if(e.key==="Enter"){

login();

}

});

</script>

</body>
</html>
